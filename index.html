<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solostarz | Store</title><style>* {  margin: 0;  padding: 0;  box-sizing: border-box;  font-family: 'Segoe UI', sans-serif;}body {  background: #0f172a;  color: white;}header {  display: flex;  justify-content: space-between;  align-items: center;  padding: 1.5rem 2rem;  background: #020617;}.logo {  font-size: 1.5rem;  font-weight: bold;  color: #22c55e;}.hero {  text-align: center;  padding: 4rem 2rem;}.hero h1 {  font-size: 2.5rem;}.hero p {  color: #94a3b8;  margin-top: 0.5rem;}.shop {  padding: 2rem;}.shop h2 {  margin-bottom: 1.5rem;}.grid {  display: grid;  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));  gap: 1.5rem;}.card {  background: #020617;  border-radius: 16px;  padding: 1rem;  text-align: center;  transition: 0.3s;}.card:hover {  transform: translateY(-5px);}.card img {  width: 100%;  border-radius: 12px;}.price {  margin: 0.5rem 0;  font-weight: bold;}button {  background: #22c55e;  border: none;  padding: 0.5rem 1rem;  border-radius: 8px;  cursor: pointer;  color: black;}button:hover {  background: #16a34a;}footer {  text-align: center;  padding: 2rem;  color: #64748b;}</style></head><body><header>  <div class="logo">? Solostarz</div></header><section class="hero">  <h1>Clean. Simple. Yours.</h1>  <p>Premium shirts designed by Solostarz</p></section><section class="shop">  <h2>Shop</h2>  <div class="grid">    <div class="card">      <img src="https://via.placeholder.com/300x300?text=Black+Shirt">      <h3>Black Shirt</h3>      <div class="price">ú25</div>      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">        <input type="hidden" name="cmd" value="_xclick">        <input type="hidden" name="business" value="your-paypal@email.com">        <input type="hidden" name="item_name" value="Black Shirt">        <input type="hidden" name="amount" value="25.00">        <input type="hidden" name="currency_code" value="GBP">        <button type="submit">Buy</button>      </form>    </div>    <div class="card">      <img src="https://via.placeholder.com/300x300?text=White+Shirt">      <h3>White Shirt</h3>      <div class="price">ú20</div>      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">        <input type="hidden" name="cmd" value="_xclick">        <input type="hidden" name="business" value="your-paypal@email.com">        <input type="hidden" name="item_name" value="White Shirt">        <input type="hidden" name="amount" value="20.00">        <input type="hidden" name="currency_code" value="GBP">        <button type="submit">Buy</button>      </form>    </div>    <div class="card">      <img src="https://via.placeholder.com/300x300?text=Limited+Edition">      <h3>Limited Edition</h3>      <div class="price">ú35</div>      <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">        <input type="hidden" name="cmd" value="_xclick">        <input type="hidden" name="business" value="your-paypal@email.com">        <input type="hidden" name="item_name" value="Limited Edition Shirt">        <input type="hidden" name="amount" value="35.00">        <input type="hidden" name="currency_code" value="GBP">        <button type="submit">Buy</button>      </form>    </div>  </div></section><footer>  ® 2026 Solostarz</footer></body></html>
