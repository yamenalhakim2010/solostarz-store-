<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solostarz | Store</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body { background:#0f172a; color:white; }

header { display:flex; justify-content:space-between; align-items:center; padding:1.5rem 2rem; background:#020617; }
.logo { font-size:1.5rem; font-weight:bold; color:#22c55e; }

.cart { cursor:pointer; position:relative; }
.cart-count {
  position:absolute;
  top:-8px;
  right:-10px;
  background:red;
  border-radius:50%;
  padding:2px 6px;
  font-size:12px;
}

.hero { text-align:center; padding:3rem 2rem; }
.shop { padding:2rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:1.5rem; }

.card { background:#020617; border-radius:16px; padding:1rem; text-align:center; transition:0.3s; }
.card:hover { transform:translateY(-5px); }
.card img { width:100%; border-radius:12px; }

button { background:#22c55e; border:none; padding:0.5rem 1rem; border-radius:8px; cursor:pointer; color:black; margin-top:10px; }
button:hover { background:#16a34a; }

/* Modal */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#020617;
  padding:2rem;
  border-radius:10px;
  width:300px;
}

input, select {
  width:100%;
  padding:8px;
  margin:8px 0;
  border-radius:5px;
  border:none;
}
</style>
</head>

<body>

<header>
  <div class="logo">★ Solostarz</div>
  <div class="cart">🛒 <span class="cart-count" id="cart-count">0</span></div>
</header>

<section class="hero">
  <h1>Clean. Simple. Yours.</h1>
</section>

<section class="shop">
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300x300?text=Black+Shirt">
      <h3>Black Shirt</h3>
      <button onclick="addToCart('Black Shirt',25)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x300?text=White+Shirt">
      <h3>White Shirt</h3>
      <button onclick="addToCart('White Shirt',20)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Complete Order</h3>
    <select id="size">
      <option>Small</option>
      <option>Medium</option>
      <option>Large</option>
    </select>

    <input type="number" id="quantity" value="1" min="1">

    <button onclick="checkout()">Proceed to Payment</button>
  </div>
</div>

<footer style="text-align:center; padding:2rem;">© 2026 Solostarz</footer>

<script>
let cartCount = 0;
let currentItem = null;

function addToCart(name, price) {
  cartCount++;
  document.getElementById('cart-count').innerText = cartCount;
  currentItem = { name, price };

  // open modal
  document.getElementById('modal').style.display = 'flex';
}

function checkout() {
  const size = document.getElementById('size').value;
  const quantity = document.getElementById('quantity').value;

  // ⚠️ REDIRECT TO STRIPE PAYMENT LINK
  window.location.href = "https://buy.stripe.com/eVq14o0gr6Ojg5LXIgfu00";
}
</script>

</body>
</html>
